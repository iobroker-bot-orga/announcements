name: Announce LATEST repositories

on:
  repository_dispatch:
    types: [announce-latest-restart]

  workflow_dispatch:
    inputs:
      template:
        type: string
        required: true
        description: 'Name of the template to apply'

      filter:
        type: string
        required: false
        description: 'Filter repositories by owner/name pattern (optional). Supports wildcards: owner/*, */name, owner*/*, */*pattern*. Case-insensitive.'

      flags:
        type: string
        required: false
        description: 'Optional flags to pass to the script'

      from:
        type: string
        required: false
        description: 'Resume processing from this adapter name (optional)'

      delay:
        type: string
        required: false
        default: '120'
        description: 'Delay in seconds between processing each repository (default: 120)'

  #schedule:
    # * is a special character in YAML, so you have to quote this string
    # every friday at 1:00
    # - cron:  '15 0 * * 5'

jobs:
  announce-repository:
    name: announce latest repository
    if: |
      github.repository == 'iobroker-bot-orga/announcements'
      
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install

      - name: Trim workflow parameters
        id: trim_params
        run: |
          # Trim all string input parameters to remove leading/trailing whitespace
          # Handle both workflow_dispatch (inputs) and repository_dispatch (client_payload)
          TEMPLATE=$(echo "${{ github.event.inputs.template }}${{ github.event.client_payload.template }}" | xargs)
          FROM=$(echo "${{ github.event.inputs.from }}${{ github.event.client_payload.from }}" | xargs)
          FILTER=$(echo "${{ github.event.inputs.filter }}${{ github.event.client_payload.filter }}" | xargs)
          FLAGS=$(echo "${{ github.event.inputs.flags }}${{ github.event.client_payload.flags }}" | xargs)
          DELAY=$(echo "${{ github.event.inputs.delay }}${{ github.event.client_payload.delay }}" | xargs)
          # Set default delay if empty
          if [ -z "$DELAY" ]; then
            DELAY="120"
          fi

          echo "template=$TEMPLATE" >> $GITHUB_OUTPUT
          echo "from=$FROM" >> $GITHUB_OUTPUT
          echo "filter=$FILTER" >> $GITHUB_OUTPUT
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT
          echo "delay=$DELAY" >> $GITHUB_OUTPUT

      - name: Announce latest repositories
        run: node ./announceLatestRepositories.js --template="${{ steps.trim_params.outputs.template }}" --from="${{ steps.trim_params.outputs.from }}" --filter="${{ steps.trim_params.outputs.filter }}" --delay="${{ steps.trim_params.outputs.delay }}" ${{ steps.trim_params.outputs.flags }}
        env:
          IOBBOT_GITHUB_TOKEN: ${{ secrets.IOBBOT_GITHUB_TOKEN }}
